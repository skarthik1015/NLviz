version: "3.9"

services:
  backend:
    build:
      context: ./backend
    command: ["python", "bootstrap_start.py"]
    ports:
      - "8000:8000"
    environment:
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
