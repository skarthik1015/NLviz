version: "3.9"

services:
  backend:
    build:
      context: ./backend
    command: ["python", "bootstrap_start.py"]
    ports:
      - "8000:8000"
    environment:
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DEV_USER_ID: karthik
      SECRET_BACKEND: local
      # Fixed 32-byte key so Fernet-encrypted connection credentials survive container restarts.
      # Change this value if you want to rotate secrets (existing connections will need to be recreated).
      SECRET_STORE_KEY: c_8ixACFhNp2gJnitMAWo4aOtgvM3xUtl6FY4avjlTk=
      ENVIRONMENT: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4.1-mini
    volumes:
      - ./backend/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
